<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS da Página -->
    <link rel="stylesheet" href="./assets/css/pages/index/index.css" />

    <!-- CSS Base -->
    <link rel="stylesheet" href="variable.css" />
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="global.css" />

    <!-- CSS de Componentes -->
    <link rel="stylesheet" href="nav.css" />
    <link rel="stylesheet" href="hero.css" />

    <title>Food Business</title>
  </head>

  <body>
    <!-- nav -->
    <header class="header">
      <div class="container header__content">
        <h1 class="logo">Food Business</h1>

        <nav class="nav">
          <a href="#home" class="nav__link">Home</a>
          <a href="#cardapio" class="nav__link">Cardápio</a>
          <a href="#estabelecimento" class="nav__link">Estabelecimento</a>
          <a href="#feedbacks" class="nav__link">Feedbacks</a>
        </nav>

        <button class="user-button">
          <img src="/assets/imgs/nav/user_icon.png" alt="Ícone do usuário" />
        </button>
      </div>
    </header>

    <!-- hero -->
    <section class="hero">
      <div class="container hero__content">
        <!-- Texto do herói -->
        <div class="hero__text">
          <h2 class="hero__title">
            Não é só comida, <br />
            é uma <span class="red">experiência</span>
          </h2>

          <a href="#cardapio" class="hero__button">Fazer Pedido</a>

          <!-- Carrossel -->
          <div class="carousel">
            <div class="carousel__track">
              <img
                src="/assets/imgs/hero/pizza_hero.png"
                alt="Imagem 1"
                class="carousel__image"
              />
              <img
                src="/assets/imgs/hero/pizza_2_hero.png"
                alt="Imagem 2"
                class="carousel__image"
              />
              <img
                src="/assets/imgs/hero/burguer_hero.png"
                alt="Imagem 3"
                class="carousel__image"
              />
            </div>
          </div>
        </div>

        <!-- Imagem ao lado do texto -->
        <div class="hero__image">
          <img src="/assets/imgs/hero/main_hero.png" alt="Main hero" />
        </div>
      </div>
    </section>

    <!-- menu -->

    <!-- footer -->
  </body>
</html>
